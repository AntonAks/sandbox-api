name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  ci:
    name: Lint and test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: sandbox_api
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/sandbox_api
      LOG_LEVEL: WARNING
      JWT_SECRET_KEY: ci-test-secret-not-for-real-use
      ACCESS_TOKEN_EXPIRE_MINUTES: "60"
      DEMO_USER_EMAIL: ci-dispatcher@example.com
      DEMO_USER_PASSWORD: ci-test-dispatcher-pass
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Apply migrations
        run: uv run alembic upgrade head

      - name: Pytest
        run: uv run pytest -v

  build-and-push:
    name: Build and push image
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Lowercase repository name
        id: repo
        run: echo "name=${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ steps.repo.outputs.name }}
          tags: |
            type=raw,value=latest
            type=sha,format=long

      - uses: docker/build-push-action@v5
        with:
          context: ./app
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: SSH deploy
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      server_ip: ${{ steps.ip.outputs.value }}
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            eu-central-1

      - uses: opentofu/setup-opentofu@v1
        with:
          tofu_wrapper: false

      - name: Resolve state bucket name
        id: state
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "bucket=sandbox-api-tfstate-${ACCOUNT_ID}" >> "$GITHUB_OUTPUT"

      - name: tofu init
        working-directory: infra
        run: tofu init -input=false -backend-config="bucket=${{ steps.state.outputs.bucket }}"

      - name: Read server IP from state
        id: ip
        working-directory: infra
        run: echo "value=$(tofu output -raw server_ip)" >> "$GITHUB_OUTPUT"

      - name: Pull and restart on server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ steps.ip.outputs.value }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/workshop
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d

  smoke-test:
    name: Smoke test
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Wait for /health/ready
        env:
          HOST: ${{ needs.deploy.outputs.server_ip }}
        run: |
          for i in $(seq 1 12); do
            if curl -fsS "http://$HOST/health/ready" | grep -q '"db":"ok"'; then
              echo "ready after $i attempt(s)"
              exit 0
            fi
            echo "attempt $i not ready, sleeping 5s"
            sleep 5
          done
          echo "smoke test failed: /health/ready never returned db:ok"
          exit 1
