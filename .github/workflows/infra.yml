name: Infra

on:
  workflow_dispatch:
    inputs:
      action:
        description: OpenTofu action to run
        required: true
        type: choice
        default: plan
        options:
          - plan
          - apply
          - destroy

jobs:
  terraform:
    name: tofu ${{ inputs.action }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: infra
    env:
      AWS_DEFAULT_REGION:       eu-central-1
      TF_VAR_admin_ip:          ${{ secrets.TF_VAR_ADMIN_IP }}
      TF_VAR_ssh_public_key:    ${{ secrets.TF_VAR_SSH_PUBLIC_KEY }}
      TF_VAR_github_repository: ${{ github.repository }}
      TF_VAR_ghcr_token:        ${{ secrets.TF_VAR_GHCR_TOKEN }}
      TF_VAR_postgres_password: ${{ secrets.TF_VAR_POSTGRES_PASSWORD }}
      TF_VAR_jwt_secret_key:    ${{ secrets.TF_VAR_JWT_SECRET_KEY }}
      TF_VAR_demo_user_email:   ${{ secrets.TF_VAR_DEMO_USER_EMAIL }}
      TF_VAR_demo_user_password: ${{ secrets.TF_VAR_DEMO_USER_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            eu-central-1

      - uses: opentofu/setup-opentofu@v1
        with:
          tofu_wrapper: false

      - name: Resolve state bucket name
        id: state
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "bucket=sandbox-api-tfstate-${ACCOUNT_ID}" >> "$GITHUB_OUTPUT"

      - name: Ensure state bucket exists
        run: |
          BUCKET="${{ steps.state.outputs.bucket }}"
          if ! aws s3api head-bucket --bucket "$BUCKET" 2>/dev/null; then
            echo "Creating state bucket $BUCKET"
            aws s3api create-bucket \
              --bucket "$BUCKET" \
              --region eu-central-1 \
              --create-bucket-configuration LocationConstraint=eu-central-1
            aws s3api put-bucket-versioning \
              --bucket "$BUCKET" \
              --versioning-configuration Status=Enabled
            aws s3api put-bucket-encryption \
              --bucket "$BUCKET" \
              --server-side-encryption-configuration \
              '{"Rules":[{"ApplyServerSideEncryptionByDefault":{"SSEAlgorithm":"AES256"}}]}'
            aws s3api put-public-access-block \
              --bucket "$BUCKET" \
              --public-access-block-configuration \
              'BlockPublicAcls=true,IgnorePublicAcls=true,BlockPublicPolicy=true,RestrictPublicBuckets=true'
          else
            echo "State bucket $BUCKET already exists"
          fi

      - name: tofu init
        run: |
          tofu init -input=false \
            -backend-config="bucket=${{ steps.state.outputs.bucket }}"

      - name: tofu fmt check
        run: tofu fmt -check -recursive

      - name: tofu validate
        run: tofu validate

      - name: tofu plan
        if: inputs.action == 'plan'
        run: tofu plan -input=false -no-color

      - name: tofu apply
        if: inputs.action == 'apply'
        run: tofu apply -input=false -auto-approve -no-color

      - name: tofu destroy
        if: inputs.action == 'destroy'
        run: tofu destroy -input=false -auto-approve -no-color

      - name: Print outputs
        if: inputs.action == 'apply'
        run: |
          {
            echo "### Outputs"
            echo ""
            echo "- **server_ip**: \`$(tofu output -raw server_ip)\`"
            echo "- **ssh_command**: \`$(tofu output -raw ssh_command)\`"
          } >> "$GITHUB_STEP_SUMMARY"
