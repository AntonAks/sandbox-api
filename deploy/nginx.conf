events {
  worker_connections 1024;
}

http {
  log_format json_combined escape=json
    '{'
      '"time":"$time_iso8601",'
      '"remote_addr":"$remote_addr",'
      '"method":"$request_method",'
      '"path":"$request_uri",'
      '"status":$status,'
      '"request_time":$request_time,'
      '"upstream_response_time":"$upstream_response_time",'
      '"bytes_sent":$bytes_sent'
    '}';

  access_log /var/log/nginx/access.log json_combined;

  upstream app {
    server app:8000;
  }

  # === DISABLE BEFORE LOAD TEST ===
  # rate raised from 10r/s to 200r/s for workshop perf testing (Bug A demo).
  # In a real prod system you'd keep stricter limits.
  limit_req_zone $binary_remote_addr zone=api:10m rate=200r/s;
  # === END DISABLE BEFORE LOAD TEST ===

  server {
    listen 80;
    server_name _;

    location / {
      # === DISABLE BEFORE LOAD TEST ===
      # burst raised from 20 to 500 for workshop perf testing.
      limit_req zone=api burst=500 nodelay;
      # === END DISABLE BEFORE LOAD TEST ===

      proxy_pass http://app;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }
}
