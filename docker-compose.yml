services:
  app:
    build:
      context: ./app
      args:
        INSTALL_DEV: "true"
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./app/src:/app/src
      - ./app/tests:/app/tests
      - ./app/pyproject.toml:/app/pyproject.toml:ro
      - ./app/data:/app/data:ro
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload --workers 1

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pg_data:
